name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Validate examples against JSON Schema
        run: |
          python - <<'EOF'
          import json, glob, sys
          from jsonschema import validate, ValidationError

          with open("schema/nail-l0.json") as f:
              schema = json.load(f)

          failed = []
          for path in sorted(glob.glob("examples/*.nail")):
              with open(path) as f:
                  doc = json.load(f)
              try:
                  validate(instance=doc, schema=schema)
                  print(f"  OK  {path}")
              except ValidationError as e:
                  print(f"  FAIL {path}: {e.message}")
                  failed.append(path)

          if failed:
              print(f"\n{len(failed)} schema validation failure(s).")
              sys.exit(1)
          else:
              print(f"\nAll examples passed schema validation.")
          EOF
      - name: Check canonical form of examples
        run: python tools/check-canonical.py
      - name: Check nail version strings in demos and playground
        run: |
          python - <<'EOF'
          import re, sys, glob
          from pathlib import Path

          # Versions older than 0.7 should not appear in demos or playground.
          # New examples must use 0.7+ to reflect current language capabilities.
          OLD_VERSION_PATTERN = re.compile(r'"nail"\s*:\s*"(0\.[0-6](?:\.\d+)?)"')

          targets = list(glob.glob("demos/**/*.py", recursive=True)) + \
                    list(glob.glob("playground/**/*.js", recursive=True)) + \
                    list(glob.glob("demos/scenarios/*.nail"))

          failures = []
          for path in sorted(targets):
              text = Path(path).read_text()
              matches = OLD_VERSION_PATTERN.findall(text)
              if matches:
                  for v in matches:
                      failures.append((path, v))
                      print(f"  OLD VERSION  {path}: \"nail\": \"{v}\" (use 0.7+ for new examples)")

          if failures:
              print(f"\n{len(failures)} old nail version string(s) found.")
              print("Update to 0.8 (or current version) to reflect current language capabilities.")
              sys.exit(1)
          else:
              print("All demo/playground nail version strings are current (0.7+).")
          EOF
      - name: Check examples (type + effect check)
        run: |
          for f in examples/*.nail; do
            echo "Checking $f..."
            if [[ "$(basename "$f")" == bad_* ]]; then
              # Negative fixture: any bad_* example must fail type/effect checking.
              python nail check "$f" && exit 1 || true
            else
              python nail check "$f" || exit 1
            fi
          done
